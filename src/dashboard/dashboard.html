<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhishGuard - Threat History</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
    }
    .topbar {
      background: #12122a;
      border-bottom: 1px solid #1e1e3a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: white;
    }
    .topbar-right { font-size: 13px; color: #6b6b8a; }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #12122a;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label { font-size: 11px; color: #6b6b8a; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 800; }
    .stat-value.red    { color: #f87171; }
    .stat-value.yellow { color: #fbbf24; }
    .stat-value.green  { color: #4ade80; }
    .stat-value.purple { color: #a78bfa; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .section-title { font-size: 14px; font-weight: 700; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.8px; }
    .clear-btn {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #6b6b8a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .clear-btn:hover { border-color: #ef4444; color: #ef4444; }
    .chart-card {
      background: #12122a;
      border: 1px solid #1e1e3a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .chart-title { font-size: 13px; color: #6b6b8a; margin-bottom: 16px; }
    #bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
    .bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      transition: height 0.6s ease;
    }
    .bar.high   { background: linear-gradient(to top, #991b1b, #ef4444); }
    .bar.medium { background: linear-gradient(to top, #92400e, #f59e0b); }
    .bar.low    { background: linear-gradient(to top, #166534, #22c55e); }
    .bar-label { font-size: 9px; color: #4a4a6a; }
    .threat-table { width: 100%; border-collapse: collapse; }
    .threat-table th {
      text-align: left;
      font-size: 11px;
      color: #6b6b8a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 1px solid #1e1e3a;
    }
    .threat-table td {
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid #1a1a2e;
      vertical-align: middle;
    }
    .threat-table tr:hover td { background: #12122a; }
    .risk-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .risk-pill.high   { background: #3a0f0f; color: #f87171; }
    .risk-pill.medium { background: #3a2a00; color: #fbbf24; }
    .risk-pill.low    { background: #0f3a1f; color: #4ade80; }
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar-bg { width: 80px; height: 6px; background: #1e1e3a; border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; }
    .domain-cell { font-weight: 600; color: #c8c8e0; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reason-cell { color: #6b6b8a; font-size: 12px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .time-cell { color: #4a4a6a; font-size: 12px; white-space: nowrap; }
    .empty-state { text-align: center; padding: 60px 0; color: #4a4a6a; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">PG</div>
      PhishGuard — Threat History
    </div>
    <div class="topbar-right" id="last-updated">Loading...</div>
  </div>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Threats</div>
        <div class="stat-value purple" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">High Risk</div>
        <div class="stat-value red" id="stat-high">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Medium Risk</div>
        <div class="stat-value yellow" id="stat-medium">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Blocked Today</div>
        <div class="stat-value green" id="stat-today">0</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Threat activity — last 14 days</div>
      <div id="bar-chart"></div>
    </div>

    <div class="section-header">
      <div class="section-title">Recent Threats</div>
      <button class="clear-btn" id="clear-btn">Clear History</button>
    </div>

    <div class="chart-card" style="padding:0;overflow:hidden">
      <div id="table-container">
        <div class="empty-state">
          <div class="empty-icon">🛡️</div>
          <div class="empty-text">No threats detected yet. Browse safely!</div>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
