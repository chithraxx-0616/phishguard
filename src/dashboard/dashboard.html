<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PhishGuard Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">PG</div>
    <span class="logo-text">PhishGuard — Threat Dashboard</span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="live-text">Live</span>
    <span class="last-updated" id="last-updated">Loading...</span>
  </div>
</header>

<div class="stats-grid">
  <div class="stat-card" data-filter="all">
    <div class="stat-label">Total Threats</div>
    <div class="stat-value c-purple" id="stat-total">0</div>
    <div class="stat-change">all time</div>
  </div>
  <div class="stat-card" data-filter="high">
    <div class="stat-label">High Risk</div>
    <div class="stat-value c-red" id="stat-high">0</div>
    <div class="stat-change">confirmed phishing</div>
  </div>
  <div class="stat-card" data-filter="medium">
    <div class="stat-label">Medium Risk</div>
    <div class="stat-value c-amber" id="stat-medium">0</div>
    <div class="stat-change">suspicious sites</div>
  </div>
  <div class="stat-card" data-filter="today">
    <div class="stat-label">Today</div>
    <div class="stat-value c-blue" id="stat-today">0</div>
    <div class="stat-change">threats detected</div>
  </div>
  <div class="stat-card" data-filter="yesterday">
    <div class="stat-label">Yesterday</div>
    <div class="stat-value c-green" id="stat-yesterday">0</div>
    <div class="stat-change">threats detected</div>
  </div>
</div>

<div class="chart-section">
  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Threat Activity — Last 7 Days</span>
      <div class="chart-tabs">
        <button class="chart-tab active" data-mode="stacked">Stacked</button>
        <button class="chart-tab" data-mode="high">High Only</button>
        <button class="chart-tab" data-mode="all">All</button>
      </div>
    </div>
    <div id="activity-chart"></div>
  </div>
</div>

<div class="two-col">
  <div class="panel">
    <div class="panel-title">Risk Distribution</div>
    <div class="donut-wrap">
      <svg id="donut-svg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-title">Top Threat Domains</div>
    <div id="top-domains"></div>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="today">Today</button>
  <button class="filter-btn" data-filter="yesterday">Yesterday</button>
  <button class="filter-btn" data-filter="week">This Week</button>
  <button class="filter-btn" data-filter="high">High Risk</button>
  <button class="filter-btn" data-filter="medium">Medium Risk</button>
  <input class="search-box" id="search-box" placeholder="Search domain...">
  <button class="debug-btn" id="debug-btn">Show Raw Data</button>
  <button class="clear-btn" id="clear-btn">Clear History</button>
</div>

<div class="threat-list" id="threat-list"></div>
<div class="toast" id="toast"></div>

<script src="dashboard.js"></script>
</body>
</html>
